name: ledger

# The full stack: the service, its Postgres + Kafka (redpanda) dependencies, and
# Prometheus + Grafana for the metrics. `docker compose up --build` brings it all
# up; the app waits for its dependencies to be healthy before starting.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 3s
      retries: 12

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.3
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports: ["9092:9092"]
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    environment:
      DATABASE_URL: postgres://ledger:ledger@postgres:5432/ledger?sslmode=disable
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: ledger.transfers
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
    ports:
      - "8080:8080" # REST + /metrics
      - "9090:9090" # gRPC
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  # Example downstream consumer of the transfer.posted events. Opt-in:
  #   docker compose --profile tools up consumer
  # then POST a transfer over REST and watch the event print in its logs.
  consumer:
    build: .
    profiles: ["tools"]
    entrypoint: ["/ledger-consumer"]
    command: ["-brokers", "redpanda:9092", "-topic", "ledger.transfers", "-group", "ledger-example-consumer"]
    depends_on:
      redpanda:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9091:9090"]
    depends_on: [app]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      # Viewer is all anonymous needs (the dashboard is provisioned read-only),
      # and it is the only role recent Grafana still supports for anonymous.
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]
