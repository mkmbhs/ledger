name: CI

# Run on every push and PR targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # ubuntu-latest ships with Docker, so the testcontainers-based
    # integration tests (Postgres) can run here.
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Single source of truth for the Go version (go 1.26).
          go-version-file: go.mod
          # Module/build caching is enabled by default.

      # Formatting gate: gofmt -l lists files that are not gofmt-clean.
      # Any output means the tree is unformatted, so fail the build.
      - name: Check formatting (gofmt)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$unformatted"
            echo "Run 'gofmt -w .' to fix."
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      # Unit tests with the race detector (proves the concurrency claims)
      # and a coverage summary.
      - name: Unit tests (race + coverage)
        run: go test -race -cover ./...

      # Integration tests spin up Postgres via testcontainers, which works
      # on the Docker-enabled runner.
      - name: Integration tests
        run: go test -tags=integration ./...
